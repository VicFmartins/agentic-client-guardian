name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (compile check)
        run: python -m compileall -q app dashboard.py

      - name: Run tests
        env:
          GEMINI_API_KEY: ""
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file for compose validation
        run: cp .env.example .env

      - name: Validate docker-compose
        run: docker compose config

      - name: Build image
        run: docker build -t agentic-client-guardian:ci .
